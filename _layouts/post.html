---
layout: default
---

<article class="post-article section">
  <header class="post-header">
    <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.tags.size > 0 %}
    <div class="post-tags">
      {% for tag in page.tags %}<span class="card-tag">{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <a href="{{ '/blog/' | relative_url }}" class="post-back">← All Posts</a>
</article>
